name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.23"

jobs:
  build-binaries:
    name: Build binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Linux binaries
        run: make build-linux-all

      - name: Build Darwin AMD64
        run: |
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o build/wlcsim-darwin-amd64 ./cmd/wlcsim

      - name: Build Darwin ARM64
        run: |
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o build/wlcsim-darwin-arm64 ./cmd/wlcsim

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: build/wlcsim-*
          retention-days: 1

  build-ova-amd64:
    name: Build OVA (AMD64)
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: build

      - name: Set binary permissions
        run: chmod +x build/wlcsim-linux-* build/wlcsim-console-linux-*

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils

      - name: Install Packer
        run: |
          curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update
          sudo apt-get install -y packer

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build OVA
        run: make ova-amd64 ACCELERATOR=kvm
        env:
          PACKER_LOG: "1"

      - name: Upload OVA
        uses: actions/upload-artifact@v4
        with:
          name: ova-amd64
          path: build/wlcsim-amd64.ova
          retention-days: 1

  release:
    name: Create release
    needs: [build-binaries, build-ova-amd64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/binaries/wlcsim-linux-amd64   release/wlcsim-linux-amd64
          cp artifacts/binaries/wlcsim-linux-arm64   release/wlcsim-linux-arm64
          cp artifacts/binaries/wlcsim-darwin-amd64  release/wlcsim-darwin-amd64
          cp artifacts/binaries/wlcsim-darwin-arm64  release/wlcsim-darwin-arm64
          cp artifacts/ova-amd64/wlcsim-amd64.ova    release/wlcsim-amd64.ova
          chmod +x release/wlcsim-*
          cd release && sha256sum * > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
